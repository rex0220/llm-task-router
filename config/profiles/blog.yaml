# 記事プロファイル: 一般的な技術ブログ
platform: ブログ
language: ja
criteria_file: config/criteria/default.md
editorial_criteria_file: config/criteria/editorial.md
style: |
  一般的な技術ブログの作法に従う。本文は標準的な Markdown。
  - プラットフォーム独自の記法（:::note など）は使わず、標準 Markdown のみで書く。
  - コードブロックは言語指定つきのフェンスを使う。
  - 表は標準 Markdown のテーブル記法（`| 列 | 列 |` と区切り行）で書く。表を ```text などのコードフェンスに入れた ASCII 表にしない。
  - 図解は ASCII アートにせず、簡潔な箇条書き・説明で表す。Mermaid（` ```mermaid `）は標準 Markdown の拡張なので、掲載先がレンダリングに対応する場合にのみ使う。
  - 見出しレベルは h2 から始め、文書全体を 1 つの h1 で始める。
