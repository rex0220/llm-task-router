# モデルIDは利用時点の公式ドキュメント/ダッシュボードで必ず確認すること。
# - OpenAI:    https://developers.openai.com/api/docs/pricing
# - Anthropic: https://docs.anthropic.com/en/docs/about-claude/models/overview

providers:
  openai:
    api_key_env: OPENAI_API_KEY_ARTICLE
  anthropic:
    api_key_env: ANTHROPIC_API_KEY_ARTICLE

# コスト概算用の単価（USD / 1M tokens）。価格改定でドリフトするため要定期確認。
# 取得時点: 2026-06（OpenAIは公式pricing、Anthropicはモデル概要に基づく概算）。
prices:
  openai:
    gpt-5.4:
      input_usd_per_1m_tokens: 2.5
      output_usd_per_1m_tokens: 15
    gpt-5.4-mini:
      input_usd_per_1m_tokens: 0.75
      output_usd_per_1m_tokens: 4.5
  anthropic:
    claude-opus-4-8:
      input_usd_per_1m_tokens: 5
      output_usd_per_1m_tokens: 25
    claude-sonnet-4-6:
      input_usd_per_1m_tokens: 3
      output_usd_per_1m_tokens: 15

defaults:
  timeout_ms: 120000

tasks:
  article_brief:
    primary:
      provider: openai
      model: gpt-5.4
    fallback:
      - provider: anthropic
        model: claude-opus-4-8
    temperature: 0.4
    max_tokens: 4000

  outline:
    primary:
      provider: anthropic
      model: claude-opus-4-8
    fallback:
      - provider: openai
        model: gpt-5.4
    temperature: 0.4
    # 比較記事など節数が多いテーマでは構成JSONが4000では打ち切られ、
    # 途中で切れたJSONがArticleOutline検証に失敗する。余裕を持たせる。
    max_tokens: 8000

  draft_markdown:
    primary:
      provider: openai
      model: gpt-5.4
    fallback:
      - provider: anthropic
        model: claude-sonnet-4-6
    temperature: 0.6
    max_tokens: 12000
    timeout_ms: 180000

  technical_review:
    primary:
      provider: anthropic
      model: claude-opus-4-8
    fallback:
      - provider: openai
        model: gpt-5.4
    temperature: 0.2
    max_tokens: 6000

  rewrite:
    primary:
      provider: openai
      model: gpt-5.4
    fallback:
      - provider: anthropic
        model: claude-sonnet-4-6
    temperature: 0.5
    max_tokens: 12000
    timeout_ms: 180000

  # final.md の評価（審査役）。本文(rewrite)は openai 主体なので、別系統の anthropic を主審査に置く。
  final_review:
    primary:
      provider: anthropic
      model: claude-opus-4-8
    fallback:
      # opus 混雑時も審査役を Anthropic に保ち、本文(openai)との別系統性を維持する。
      - provider: anthropic
        model: claude-sonnet-4-6
      - provider: openai
        model: gpt-5.4
    temperature: 0.2
    max_tokens: 6000

  # 編集レビュー（読者・編集視点の批評）。本文(rewrite)の書き手と独立させるため、
  # candidate set は両 provider をまたぐ（実行時に finalAuthorModel.provider を除外しても
  # 別 provider が残る）。通常は Anthropic が担当し、rewrite が Anthropic fallback した場合は
  # runtime filter で Anthropic を落として OpenAI に回る。
  editorial_review:
    primary:
      provider: anthropic
      model: claude-opus-4-8
    fallback:
      - provider: openai
        model: gpt-5.4
    temperature: 0.2
    max_tokens: 6000

  markdown_format:
    primary:
      provider: openai
      model: gpt-5.4-mini
    temperature: 0.2
    max_tokens: 8000

  title_suggestions:
    primary:
      provider: openai
      model: gpt-5.4-mini
    temperature: 0.5
    max_tokens: 1200
